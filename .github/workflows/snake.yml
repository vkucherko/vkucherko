# Generates the contribution-graph "snake" as a self-contained animated SVG
# and commits it to the `output` branch. The README embeds it from that branch,
# so there is ZERO third-party dependency at view time — GitHub's own CDN serves it.
#
# ── ONE-TIME SETUP (do both or the image renders broken) ─────────────────────
#   1. Repo → Settings → Actions → General → Workflow permissions → "Read and write"
#   2. After the first push, go to the Actions tab → "generate snake" → "Run workflow"
#      (the cron does NOT fire immediately; this seeds the `output` branch).
# ─────────────────────────────────────────────────────────────────────────────

name: generate snake

on:
  schedule:
    - cron: "0 6 * * *"      # once daily, 06:00 UTC
  workflow_dispatch:          # manual "Run workflow" button (needed for first run)
  push:
    branches: [main]

permissions:
  contents: write             # required so the job can push to the output branch

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
