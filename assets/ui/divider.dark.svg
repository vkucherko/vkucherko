<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 24" width="520" height="24" fill="none">
  <style>
    .base{ stroke:#30363d; stroke-width:1.6; }
    .gl{ stroke:#0abdc6; stroke-width:2.4; stroke-linecap:round; opacity:0; }
    .glL{ animation:sweepL 3.2s ease-in-out infinite; }
    .glR{ animation:sweepR 3.2s ease-in-out infinite; }
    @keyframes sweepL{ 0%{transform:translateX(-30px);opacity:0} 14%{opacity:.95} 44%{opacity:.95} 52%{transform:translateX(224px);opacity:0} 100%{transform:translateX(224px);opacity:0} }
    @keyframes sweepR{ 0%{transform:translateX(30px);opacity:0} 14%{opacity:.95} 44%{opacity:.95} 52%{transform:translateX(-224px);opacity:0} 100%{transform:translateX(-224px);opacity:0} }
    @media (prefers-reduced-motion:reduce){ .gl{ display:none } }
  </style>
  <path class="base" d="M2 10 L236 10 L256 17 Q260 18.4 264 17 L284 10 L518 10" stroke-linejoin="round" stroke-linecap="round"/>
  <path class="gl glL" d="M2 10 L46 10"/>
  <path class="gl glR" d="M474 10 L518 10"/>
</svg>
