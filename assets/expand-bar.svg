<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 34" width="900" height="34" role="img" aria-label="Expandable — click to open">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a9ab4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#8a9ab4" stop-opacity="0.6"/>
      <stop offset="0.85" stop-color="#8a9ab4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#8a9ab4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf4fc" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#eaf4fc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#eaf4fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="b" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="1.2"/></filter>
    <clipPath id="ribbon"><use href="#sil"/></clipPath>
    <style>
      /* travel in from each end, arrive + briefly overlap AT the chevron point (x=450), fade there */
      @keyframes travelL{ 0%{opacity:0;transform:translateX(0)} 14%{opacity:.5} 40%{opacity:.75;transform:translateX(405px)} 52%{opacity:.75;transform:translateX(405px)} 64%{opacity:0;transform:translateX(405px)} 100%{opacity:0;transform:translateX(0)} }
      @keyframes travelR{ 0%{opacity:0;transform:translateX(0)} 14%{opacity:.5} 40%{opacity:.75;transform:translateX(-405px)} 52%{opacity:.75;transform:translateX(-405px)} 64%{opacity:0;transform:translateX(-405px)} 100%{opacity:0;transform:translateX(0)} }
      .hlL{animation:travelL 3.4s ease-in-out infinite}
      .hlR{animation:travelR 3.4s ease-in-out infinite}
      @media (prefers-reduced-motion:reduce){ .hlL,.hlR{animation:none;opacity:0} }
    </style>
  </defs>
  <!-- filled silhouette: thin line tapering into a rounded-point down-chevron (ported from Chia buildSilhouette, dy=+7). Extra viewBox height below = padding under the chevron. -->
  <path id="sil" d="M 0 11.4 L 430 11.4 Q 435 11.4 439.62 13.31 L 446.77 16.26 Q 450 17.6 453.23 16.26 L 460.38 13.31 Q 465 11.4 470 11.4 L 900 11.4 L 900 12.6 L 470 12.6 Q 465 12.6 460.57 14.91 L 453.10 18.79 Q 450 20.4 446.90 18.79 L 439.43 14.91 Q 435 12.6 430 12.6 L 0 12.6 Z" fill="url(#fade)"/>
  <g clip-path="url(#ribbon)">
    <rect class="hlL" x="0" y="4" width="90" height="20" fill="url(#hl)" filter="url(#b)"/>
    <rect class="hlR" x="810" y="4" width="90" height="20" fill="url(#hl)" filter="url(#b)"/>
  </g>
</svg>
